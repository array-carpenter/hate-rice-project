<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - Hate Rice</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍚</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>&#x1F35A; The Hate Rice Project</h1>
            <p>Which response is better? You decide.</p>
        </header>

        <nav>
            <a href="index.html">Vote</a>
            <a href="results.html">Results</a>
        </nav>

        <div id="vote-area">
            <div class="base-prompt">
                <label>The Prompt</label>
                <p id="base-prompt-text"></p>
            </div>

            <div class="responses">
                <div class="response-card" id="response-a" onclick="selectResponse('a')">
                    <h3>Response A</h3>
                    <div class="text" id="response-a-text"></div>
                </div>
                <div class="response-card" id="response-b" onclick="selectResponse('b')">
                    <h3>Response B</h3>
                    <div class="text" id="response-b-text"></div>
                </div>
            </div>

            <button class="vote-btn" id="vote-btn" disabled onclick="submitVote()">
                Pick one to vote
            </button>
        </div>

        <div id="reveal-area" class="hidden">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <script src="experiments.js"></script>
    <script src="app.js"></script>
    <script>
        loadVotePage();
    </script>
</body>
</html>
