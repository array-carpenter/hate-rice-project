<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hate Rice - Does Prompt Tone Matter?</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍚</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>&#x1F35A; The Hate Rice Project</h1>
            <p>Does the tone of a prompt change the quality of LLM output?</p>
        </header>

        <nav>
            <a href="index.html" class="active">Vote</a>
            <a href="results.html">Results</a>
        </nav>

        <div id="category-picker">
            <h2 style="text-align:center;margin-bottom:0.5rem;">Pick a category</h2>
            <p style="text-align:center;color:#888;margin-bottom:1.5rem;">Two AI responses to the same prompt. You pick the better one.</p>
            <div class="category-grid">
                <button class="category-card" onclick="startCategory('creative')">
                    <span class="cat-emoji">&#x270D;&#xFE0F;</span>
                    <span class="cat-name">Creative</span>
                    <span class="cat-desc">Poetry, stories, design</span>
                </button>
                <button class="category-card" onclick="startCategory('knowledge')">
                    <span class="cat-emoji">&#x1F4A1;</span>
                    <span class="cat-name">Knowledge</span>
                    <span class="cat-desc">Explanations, how things work</span>
                </button>
                <button class="category-card" onclick="startCategory('reasoning')">
                    <span class="cat-emoji">&#x1F9E9;</span>
                    <span class="cat-name">Reasoning</span>
                    <span class="cat-desc">Logic, math, puzzles</span>
                </button>
                <button class="category-card" onclick="startCategory('coding')">
                    <span class="cat-emoji">&#x1F4BB;</span>
                    <span class="cat-name">Coding</span>
                    <span class="cat-desc">Programming tasks</span>
                </button>
            </div>
        </div>

        <div id="vote-area" class="hidden">
            <div class="base-prompt">
                <label>The Prompt</label>
                <p id="base-prompt-text"></p>
            </div>

            <div class="responses">
                <div class="response-card" id="response-a" onclick="selectResponse('a')">
                    <h3>Response A</h3>
                    <div class="text" id="response-a-text"></div>
                </div>
                <div class="response-card" id="response-b" onclick="selectResponse('b')">
                    <h3>Response B</h3>
                    <div class="text" id="response-b-text"></div>
                </div>
            </div>

            <div class="vote-actions">
                <button class="vote-btn" id="vote-btn" disabled onclick="submitVote()">
                    Pick one to vote
                </button>
                <button class="skip-btn" onclick="skipExperiment()">
                    Skip
                </button>
            </div>
        </div>

        <div id="reveal-area" class="hidden">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <script src="experiments.js"></script>
    <script src="app.js"></script>
    <script>
        loadVotePage();
    </script>
</body>
</html>
